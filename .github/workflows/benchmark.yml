name: benchmark

# Runs on pull requests, and on pushes to main (the latter refreshes the
# stored baseline after a change lands). The benchmark job drives a
# self-hosted runner attached to real hardware, so the jobs are guarded to
# skip pull requests coming from forks — only PRs whose branch lives in this
# repository ever reach the board. Fork PRs trigger nothing on hardware.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: esp32-board
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    # Skip fork PRs: only run for pushes, manual dispatch, or PRs whose head
    # branch is in this repository. benchmark (needs: build) is skipped with
    # it, so fork code never reaches the self-hosted board.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.3
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          . "$IDF_PATH/export.sh"
          # The IDF component manager occasionally reports a git-sourced
          # component (u8g2) as "corrupted" on a racy download. Retry the
          # dependency resolution + build with a clean slate a few times.
          for attempt in 1 2 3; do
            echo "::group::build attempt $attempt"
            if idf.py build; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "build attempt $attempt failed, cleaning and retrying"
            rm -rf build managed_components dependencies.lock
          done
          echo "build failed after 3 attempts"
          exit 1

      - name: Merge benchmark flash image
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          cd build
          # merge_bin does not accept --flash_size detect
          sed 's/--flash_size detect/--flash_size keep/' flash_args > merge_args
          esptool.py --chip esp32s3 merge_bin -o merged.bin @merge_args
          ls -l merged.bin

      - name: Build eval firmware (CONFIG_LLM_EVAL=y)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          # Same sources, correctness-eval build flavor. Dependencies are
          # already resolved from the benchmark build, so a single pass is
          # enough (no retry wrapper needed).
          echo "CONFIG_LLM_EVAL=y" >> sdkconfig
          idf.py build
          cd build
          sed 's/--flash_size detect/--flash_size keep/' flash_args > merge_args
          esptool.py --chip esp32s3 merge_bin -o eval.bin @merge_args
          ls -l eval.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/merged.bin
            build/eval.bin
          if-no-files-found: error

  benchmark:
    needs: build
    runs-on: [self-hosted, esp32]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - name: Flash and measure tok/s (via jumpstarter lease)
        run: |
          podman run --rm --network host --userns keep-id -e HOME=/tmp \
            -v "$HOME/.config/jumpstarter/ci-client.yaml:/tmp/ci.yaml:ro,z" \
            -v "$PWD:/workspace:z" -w /workspace \
            quay.io/jumpstarter-dev/jumpstarter:latest \
            jmp shell --client-config /tmp/ci.yaml --selector board=esp32 -- \
            python scripts/benchmark.py firmware/merged.bin --runs 3 --out result.json

      - name: Correctness eval — perplexity vs golden (via jumpstarter lease)
        run: |
          podman run --rm --network host --userns keep-id -e HOME=/tmp \
            -v "$HOME/.config/jumpstarter/ci-client.yaml:/tmp/ci.yaml:ro,z" \
            -v "$PWD:/workspace:z" -w /workspace \
            quay.io/jumpstarter-dev/jumpstarter:latest \
            jmp shell --client-config /tmp/ci.yaml --selector board=esp32 -- \
            python scripts/eval.py firmware/eval.bin --golden eval/golden.json --out eval_result.json

      - name: Fetch baseline
        run: |
          git fetch origin benchmark-data || true
          git show origin/benchmark-data:baseline.json > baseline.json 2>/dev/null \
            || echo "no baseline available yet"

      - name: Compare against baseline
        run: python3 scripts/compare_benchmark.py result.json --baseline baseline.json

      - name: Report results (step summary + PR comment)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On pull_request the PR number is known directly; on push to main
          # there is none and pr_comment.py just writes the step summary.
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 scripts/pr_comment.py \
            --result result.json --eval eval_result.json --baseline baseline.json

      - name: Update baseline (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "benchmark-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin benchmark-data
          git worktree add "$RUNNER_TEMP/bdata" benchmark-data
          cp result.json "$RUNNER_TEMP/bdata/baseline.json"
          cd "$RUNNER_TEMP/bdata"
          git add baseline.json
          git commit -m "baseline from $GITHUB_SHA" || echo "baseline unchanged"
          git push origin benchmark-data
          cd -
          git worktree remove --force "$RUNNER_TEMP/bdata"

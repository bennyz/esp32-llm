name: benchmark

# Note: no pull_request trigger on purpose — the benchmark job runs on a
# self-hosted runner attached to real hardware, so only trusted pushes to
# this repository may trigger it.
on:
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: esp32-board
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.3
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          . "$IDF_PATH/export.sh"
          idf.py build

      - name: Merge flash image
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          cd build
          # merge_bin does not accept --flash_size detect
          sed 's/--flash_size detect/--flash_size keep/' flash_args > merge_args
          esptool.py --chip esp32s3 merge_bin -o merged.bin @merge_args
          ls -l merged.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/merged.bin
          if-no-files-found: error

  benchmark:
    needs: build
    runs-on: [self-hosted, esp32]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - name: Flash and measure tok/s (via jumpstarter lease)
        run: |
          podman run --rm --network host --userns keep-id -e HOME=/tmp \
            -v "$HOME/.config/jumpstarter/ci-client.yaml:/tmp/ci.yaml:ro,z" \
            -v "$PWD:/workspace:z" -w /workspace \
            quay.io/jumpstarter-dev/jumpstarter:latest \
            jmp shell --client-config /tmp/ci.yaml --selector board=esp32 -- \
            python scripts/benchmark.py firmware/merged.bin --runs 3 --out result.json

      - name: Fetch baseline
        run: |
          git fetch origin benchmark-data || true
          git show origin/benchmark-data:baseline.json > baseline.json 2>/dev/null \
            || echo "no baseline available yet"

      - name: Compare against baseline
        run: python3 scripts/compare_benchmark.py result.json --baseline baseline.json

      - name: Update baseline (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "benchmark-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin benchmark-data
          git worktree add "$RUNNER_TEMP/bdata" benchmark-data
          cp result.json "$RUNNER_TEMP/bdata/baseline.json"
          cd "$RUNNER_TEMP/bdata"
          git add baseline.json
          git commit -m "baseline from $GITHUB_SHA" || echo "baseline unchanged"
          git push origin benchmark-data
          cd -
          git worktree remove --force "$RUNNER_TEMP/bdata"
